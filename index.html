<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravioli</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px;
            background: #1a1a1a; color: #fff; font-family: sans-serif;
            z-index: 10; transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="loading">
        <span>Click to start</span>
    </div>

    <script type="module">
        const canvas = document.getElementById('game-canvas');
        function resizeCanvas() {
            canvas.width = window.innerWidth * devicePixelRatio;
            canvas.height = window.innerHeight * devicePixelRatio;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        import init from './ravioli.js';

        const loading = document.getElementById('loading');
        let initialized = false;

        async function start() {
            if (initialized) return;
            initialized = true;
            loading.innerHTML = '<div class="spinner"></div><span>Loading Ravioli...</span>';

            try {
                await init();
                loading.classList.add('hidden');
            } catch (err) {
                if (err.message && err.message.includes('Using exceptions for control flow')) {
                    loading.classList.add('hidden');
                    return;
                }
                loading.innerHTML = `<span style="color:#e74c3c">Failed to load: ${err}</span>`;
                console.error(err);
            }
        }

        loading.addEventListener('click', start, { once: true });
        loading.addEventListener('touchstart', start, { once: true });
    </script>
</body>
</html>
