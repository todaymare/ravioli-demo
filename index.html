<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravioli</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        canvas { display: block; width: 100%; height: 100%; cursor: none; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
        }

        canvas {
            display: block;
            width: 100%; height: 100%;
        }

        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 24px;
            background: #0a0a0a;
            color: #e8e8e8;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title {
            font-size: 11px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #555;
            margin-bottom: 8px;
        }

        .status {
            font-size: 13px;
            letter-spacing: 0.15em;
            color: #e8e8e8;
            min-height: 20px;
            text-align: center;
        }

        .bar-container {
            width: 280px;
            height: 2px;
            background: #1e1e1e;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #e8e8e8;
            width: 0%;
            transition: width 0.15s ease;
        }

        .bar-container.indeterminate .bar-fill {
            width: 40%;
            animation: slide 1.2s ease-in-out infinite;
        }

        @keyframes slide {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }

        .pct {
            font-size: 11px;
            letter-spacing: 0.2em;
            color: #444;
            min-height: 16px;
        }

        .click-hint {
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #444;
            animation: blink 1.6s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        .error {
            color: #c0392b;
            font-size: 12px;
            letter-spacing: 0.1em;
            max-width: 320px;
            text-align: center;
            line-height: 1.6;
        }

        #discord-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 5;
            background: #5865F2;
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 8px 14px;
            border: none;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }

        #discord-btn:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <a id="discord-btn" href="https://daymare.net/community" target="_blank">
        Discord
    </a>

    <div id="loading">
        <div class="title">Ravioli</div>
        <div class="status" id="status">Click anywhere to start</div>
        <div class="bar-container" id="bar-container">
            <div class="bar-fill" id="bar-fill"></div>
        </div>
        <div class="pct" id="pct"></div>
        <div class="click-hint" id="click-hint">[ click to begin ]</div>

    </div>

    <script type="module">
        // Fix: WebGPU's GPUCanvasContext instanceof check fails on some
        // Chromium/Linux builds due to cross-realm prototype mismatches.
        // Replace the global with the actual browser constructor before wasm loads.
        if (typeof navigator.gpu !== 'undefined') {
            const tmp = document.createElement('canvas');
            const ctx = tmp.getContext('webgpu');
            if (ctx) {
                window.GPUCanvasContext = ctx.constructor;
            }
        }

        const canvas    = document.getElementById('game-canvas');
        const loading   = document.getElementById('loading');
        const statusEl  = document.getElementById('status');
        const barFill   = document.getElementById('bar-fill');
        const barCont   = document.getElementById('bar-container');
        const pctEl     = document.getElementById('pct');
        const hintEl    = document.getElementById('click-hint');

        function resizeCanvas() {
            canvas.width  = Math.floor(window.innerWidth  * devicePixelRatio);
            canvas.height = Math.floor(window.innerHeight * devicePixelRatio);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function setStatus(msg) {
            statusEl.textContent = msg;
        }

        function setProgress(loaded) {
            barCont.classList.add('indeterminate');
            pctEl.textContent = (loaded / 1_000_000).toFixed(1) + ' MB';
        }

        function showError(msg) {
            loading.innerHTML = `<div class="title">Ravioli</div><div class="error">${msg}</div>`;
        }

        let initialized = false;

        async function start() {
            if (initialized) return;
            initialized = true;
            hintEl.style.display = 'none';

            try {
                // Fetch wasm with progress tracking
                setStatus('Fetching...');
                const response = await fetch('./ravioli_bg.wasm?v=559');

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                let loaded = 0;
                setProgress(loaded);

                const reader = response.body.getReader();
                const chunks = [];

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    loaded += value.length;
                    setProgress(loaded);
                }

                // Assemble buffer
                setStatus('Initializing...');
                barCont.classList.add('indeterminate');
                pctEl.textContent = '';

                const wasmBytes = new Uint8Array(loaded);
                let offset = 0;
                for (const chunk of chunks) {
                    wasmBytes.set(chunk, offset);
                    offset += chunk.length;
                }

                // Init wasm
                const { default: init } = await import('./ravioli.js?v=559');
                await init(wasmBytes.buffer);

                loading.classList.add('hidden');

            } catch (err) {
                if (err?.message?.includes('Using exceptions for control flow')) {
                    loading.classList.add('hidden');
                    return;
                }
                console.error(err);
                showError(`Failed to load<br><br>${err.message ?? err}`);
            }
        }

        loading.addEventListener('click',      start, { once: true });
        loading.addEventListener('touchstart', start, { once: true });
    </script>
</body>
</html>
